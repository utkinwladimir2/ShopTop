<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Social Mall — социальная сеть-витрина реферальных подборок в стиле виртуального торгового центра."
    />
    <title>Social Mall</title>
    <link rel="stylesheet" href="./styles.css" />

    <header class="topbar">
      <a class="brand" href="#/">

        <span id="coinBalance">0</span>

    <main id="app" class="app-shell"></main>

    <nav class="mobile-nav" aria-label="Мобильное меню">
